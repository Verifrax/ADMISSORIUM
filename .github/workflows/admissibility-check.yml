name: admissorium-admissibility
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  admissibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: node dist/cli/admissorium.js audit --org Verifrax
